services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: primerpeso
      POSTGRES_USER: primerpeso
      POSTGRES_PASSWORD: primerpeso
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primerpeso -d primerpeso"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/primerpeso-receipts || true
      "

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      PUBLIC_BASE_URL: http://localhost:8080
      DATABASE_URL: postgres://primerpeso:primerpeso@postgres:5432/primerpeso?sslmode=disable
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
      AUTH_SECRET: primerpeso-auth-secret-change-me
      MASTER_KEY: primerpeso-master-key-change-me
      HASH_KEY: primerpeso-hash-key-change-me
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: primerpeso-receipts
      MINIO_USE_SSL: "false"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: hola@primerpeso.local
      MOBILE_DEEP_LINK_SCHEME: primerpeso
      XAI_MODEL: grok-4-1-fast-reasoning
      OCR_BACKEND: tesseract
      OCR_LANGUAGE: spa+eng
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  minio-data:
