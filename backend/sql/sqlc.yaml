        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: jsonb
            go_type:
              import: encoding/json
              type: RawMessage
  - engine: postgresql
    schema:
      - migrations
    queries:
      - queries/identity.sql
    gen:
      go:
        package: store
        out: ../internal/identity/store
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: true
  - engine: postgresql
    schema:
      - migrations
    queries:
      - queries/savings.sql
    gen:
      go:
        package: store
        out: ../internal/savings/store
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
