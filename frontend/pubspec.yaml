publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  forui: ^0.18.0
