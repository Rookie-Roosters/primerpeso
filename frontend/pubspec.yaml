name: primerpeso
description: "PrimerPeso — financial decision companion for Mexican youth (by rookieroosters)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  forui: ^0.18.0
  mix: ^2.0.0
  google_fonts: ^6.2.1

  # Routing
  go_router: ^14.0.0

  # State
  shard: ^1.0.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^10.0.0
  app_links: ^7.0.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  file_picker: ^8.1.7
  flutter_markdown: ^0.7.7

  # Networking / AG-UI
  http: ^1.2.0
  connectrpc:
    path: packages/connectrpc
  protobuf: ^6.0.0
  fixnum: ^1.1.1
  intl: ^0.20.2

dependency_overrides:
  protobuf: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
